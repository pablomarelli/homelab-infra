apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-portfolio
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/PabloMarelli/dev-portfolio.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
