apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-portfolio
  namespace: argocd
  labels:
    notifications.argocd/channel: main
    notifications.argocd/profile: app
spec:
  project: default
  source: 
    repoURL: https://github.com/pablomarelli/homelab-infra.git
    targetRevision: HEAD
    path: manifests/dev-portfolio
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
