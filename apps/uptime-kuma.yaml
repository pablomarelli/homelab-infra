apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  labels:
    notifications.argocd/channel: infra
    notifications.argocd/profile: infra
spec:
  project: default
  source:
    repoURL: https://github.com/pablomarelli/homelab-infra.git
    targetRevision: main
    path: manifests/uptime-kuma
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
