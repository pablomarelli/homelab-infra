apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  labels:
    notifications.argocd/channel: main
    notifications.argocd/profile: critical
spec:
  project: default
  sources:
    # Helm chart from official repo
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2024.4.2
      helm:
        valueFiles:
          - $values/manifests/authentik/values.yaml
    # Values file from your infra repo
    - repoURL: https://github.com/pablomarelli/homelab-infra.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
