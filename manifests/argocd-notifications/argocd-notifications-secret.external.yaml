apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: discord-infra-webhook-url
      remoteRef:
        key: argocd-notifications/discord-infra-webhook-url
    - secretKey: discord-main-webhook-url
      remoteRef:
        key: argocd-notifications/discord-main-webhook-url
