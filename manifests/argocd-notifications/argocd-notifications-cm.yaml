---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Discord webhook service configuration
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  subscriptions: |
    - recipients:
      - discord
      triggers:
      - on-sync-succeeded

  # Trigger definition for successful sync
  trigger.on-sync-succeeded: |
    - when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [app-sync-succeeded]

  # Discord notification template
  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "{{.app.metadata.name}} deployed",
              "description": "Application synced successfully",
              "color": 3066993,
              "fields": [
                {
                  "name": "Project",
                  "value": "{{.app.spec.project}}",
                  "inline": true
                },
                {
                  "name": "Health",
                  "value": "{{.app.status.health.status}}",
                  "inline": true
                }
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }
