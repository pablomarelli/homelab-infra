apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Logging configuration
    logging {
      level = "info"
      format = "logfmt"
    }
    // Discover all pods in the cluster
    discovery.kubernetes "pods" {
      role = "pod"
    }
    // Relabel discovered pods to extract useful labels
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets
      // Keep only running pods
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Unknown"
        action        = "drop"
      }
      // Set namespace label
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      // Set pod name label
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      // Set container name label
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      // Set node name label
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      // Set the log file path
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        target_label  = "__path__"
        replacement   = "/var/log/pods/*$1/*.log"
      }
    }
    // Match log files from discovered pods
    local.file_match "pod_logs" {
      path_targets = discovery.relabel.pod_logs.output
    }
    // Read log files
    loki.source.file "pod_logs" {
      targets    = local.file_match.pod_logs.targets
      forward_to = [loki.process.pod_logs.receiver]
    }
    // Process logs (parse JSON if applicable, add labels)
    loki.process "pod_logs" {
      stage.cri {}  // Parse CRI format logs (containerd)
      
      forward_to = [loki.write.loki.receiver]
    }
    // Write logs to Loki
    loki.write "loki" {
      endpoint {
        url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
