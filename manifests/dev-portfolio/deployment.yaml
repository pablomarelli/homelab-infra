apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-portfolio
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-portfolio
  template:
    metadata:
      labels:
        app: dev-portfolio
    spec:
      nodeSelector:
        homelab/node-role: worker
        homelab/power: non-ups
      tolerations:
        - key: homelab/power
          operator: Equal
          value: non-ups
          effect: NoSchedule
      containers:
        - name: dev-portfolio
          image: ghcr.io/pablomarelli/dev-portfolio:2026.5.26
          ports:
            - containerPort: 80
          volumeMounts:
            - name: crawler-files
              mountPath: /usr/share/nginx/html/robots.txt
              subPath: robots.txt
              readOnly: true
            - name: crawler-files
              mountPath: /usr/share/nginx/html/llms.txt
              subPath: llms.txt
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: crawler-files
          configMap:
            name: dev-portfolio-crawler-files
