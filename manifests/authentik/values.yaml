authentik:
  secret_key: ""
  error_reporting:
    enabled: false
  postgresql:
    host: postgresql.monitoring.svc.cluster.local
    name: authentik
    user: authentik
    password: ""
server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  envFrom:
    - secretRef:
        name: authentik-secrets
  env:
    - name: AUTHENTIK_POSTGRESQL__HOST
      value: "postgresql.monitoring.svc.cluster.local"
    - name: AUTHENTIK_POSTGRESQL__NAME
      value: "authentik"
    - name: AUTHENTIK_POSTGRESQL__USER
      value: "authentik"
worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  envFrom:
    - secretRef:
        name: authentik-secrets
  env:
    - name: AUTHENTIK_POSTGRESQL__HOST
      value: "postgresql.monitoring.svc.cluster.local"
    - name: AUTHENTIK_POSTGRESQL__NAME
      value: "authentik"
    - name: AUTHENTIK_POSTGRESQL__USER
      value: "authentik"
postgresql:
  enabled: false
redis:
  enabled: true
  image:
    repository: bitnami/redis
    tag: 7.4-debian-12
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
