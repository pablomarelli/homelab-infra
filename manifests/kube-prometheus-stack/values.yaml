# Grafana configuration
grafana:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initChownData:
    enabled: true
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
  # Additional data sources (Loki for logs)
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
# Alertmanager configuration (Discord will be added in Phase 8)
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
# Node exporter for host metrics
nodeExporter:
  enabled: true
# kube-state-metrics for K8s metrics
kubeStateMetrics:
  enabled: true
# Disable components not needed for single-node homelab
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
