apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infrastructure-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
data:
  infrastructure-logs.json: |
    {
      "title": "Infrastructure Logs",
      "uid": "infrastructure-logs",
      "tags": ["logs", "infrastructure"],
      "timezone": "browser",
      "refresh": "1m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "current": {"text": "kube-system", "value": "kube-system"},
            "options": [
              {"text": "kube-system", "value": "kube-system", "selected": true},
              {"text": "argocd", "value": "argocd", "selected": false},
              {"text": "infrastructure", "value": "infrastructure", "selected": false}
            ],
            "query": "kube-system,argocd,infrastructure"
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
            "query": "label_values({namespace=\"$namespace\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*"
          },
          {
            "name": "container",
            "type": "query",
            "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
            "query": "label_values({namespace=\"$namespace\", pod=~\"$pod\"}, container)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*"
          },
          {
            "name": "search",
            "type": "textbox",
            "current": {"text": "", "value": ""},
            "label": "Search"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log Volume by Namespace",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 18, "x": 0, "y": 0},
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "targets": [
            {
              "expr": "sum by (namespace) (count_over_time({namespace=~\"kube-system|argocd|infrastructure\"} [$__interval]))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 50,
                "stacking": {"mode": "normal"}
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Count",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"$namespace\"} |~ \"(?i)(error|fatal|panic)\" [$__range]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Logs",
          "type": "logs",
          "gridPos": {"h": 18, "w": 24, "x": 0, "y": 6},
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"} |~ \"(?i)$search\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        }
      ],
      "schemaVersion": 39
    }
