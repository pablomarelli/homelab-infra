apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-observability-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Observability"
data:
  observability-logs.json: |
    {
      "title": "Observability Logs",
      "uid": "observability-logs",
      "tags": ["logs", "observability", "monitoring"],
      "timezone": "browser",
      "refresh": "1m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "component",
            "type": "custom",
            "current": {"text": "All", "value": ".*"},
            "options": [
              {"text": "All", "value": ".*", "selected": true},
              {"text": "Prometheus", "value": "prometheus.*", "selected": false},
              {"text": "Grafana", "value": ".*grafana.*", "selected": false},
              {"text": "Loki", "value": "loki.*", "selected": false},
              {"text": "Alloy", "value": "alloy.*", "selected": false},
              {"text": "Alertmanager", "value": "alertmanager.*", "selected": false},
              {"text": "Authentik", "value": "authentik.*", "selected": false},
              {"text": "Uptime Kuma", "value": "uptime-kuma.*", "selected": false},
              {"text": "Umami", "value": "umami.*", "selected": false},
              {"text": "PostgreSQL", "value": "postgresql.*", "selected": false}
            ]
          },
          {
            "name": "level",
            "type": "custom",
            "current": {"text": "All", "value": ""},
            "options": [
              {"text": "All", "value": "", "selected": true},
              {"text": "debug", "value": "debug", "selected": false},
              {"text": "info", "value": "info", "selected": false},
              {"text": "warn", "value": "warn", "selected": false},
              {"text": "error", "value": "error", "selected": false}
            ]
          },
          {
            "name": "search",
            "type": "textbox",
            "current": {"text": "", "value": ""},
            "label": "Search"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log Volume by Component",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum by (pod) (count_over_time({namespace=\"monitoring\", pod=~\"$component\"} [$__interval]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 50,
                "stacking": {"mode": "normal"}
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Logs",
          "type": "logs",
          "gridPos": {"h": 18, "w": 24, "x": 0, "y": 6},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "{namespace=\"monitoring\", pod=~\"$component\"} |~ \"(?i)$search\" | level=~\"$level.*\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        }
      ],
      "schemaVersion": 39
    }
