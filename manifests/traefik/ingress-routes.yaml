---
# Grafana - No forward auth (uses native OAuth)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.pablomarelli.dev`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
---
# Uptime Kuma - Public status pages (no auth)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma-public
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`status.pablomarelli.dev`) && PathPrefix(`/status`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
    - match: Host(`status.pablomarelli.dev`) && PathPrefix(`/api/status-page`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
    - match: Host(`status.pablomarelli.dev`) && PathPrefix(`/assets`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
---
# Uptime Kuma - Admin dashboard (with forward auth)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma-admin
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`status.pablomarelli.dev`)
      kind: Rule
      middlewares:
        - name: authentik-auth
          namespace: monitoring
      services:
        - name: uptime-kuma
          port: 3001
---
# Authentik - needs to be accessible for auth redirects
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`auth.pablomarelli.dev`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
---
# ArgoCD
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.pablomarelli.dev`)
      kind: Rule
      services:
        - name: argocd-server
          port: 443
          scheme: https
          serversTransport: argocd-transport
---
# ArgoCD Server Transport (for self-signed cert)
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-transport
  namespace: argocd
spec:
  insecureSkipVerify: true
---
# Other apps (portfolio, finance, home-assistant, analytics)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`portfolio.pablomarelli.dev`)
      kind: Rule
      services:
        - name: portfolio-svc
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: finance
  namespace: finance
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`finance.pablomarelli.dev`)
      kind: Rule
      services:
        - name: finance-svc
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`home.pablomarelli.dev`)
      kind: Rule
      services:
        - name: home-assistant-svc
          port: 8123
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: umami
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`analytics.pablomarelli.dev`)
      kind: Rule
      services:
        - name: umami
          port: 3000
